<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Калькулятор выплат</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="styles.css">
  <script defer src="main.dart.js"></script>
</head>
<body>
  <div class="title">Калькулятор выплат</div>
  <p class="subtitle">Заполните форму — суммы пересчитываются сразу. Нормы 2026 года, оценка.</p>

  <div class="section">
    <h2>Данные</h2>
    <label>Возраст</label>
    <input type="number" id="age" min="1" max="120" value="30" inputmode="numeric">
    <label>Пол</label>
    <select id="gender">
      <option value="">Выберите</option>
      <option value="male">Мужской</option>
      <option value="female">Женский</option>
    </select>
    <label>Занятость</label>
    <select id="employment"></select>
    <label>Регион</label>
    <select id="region"></select>
  </div>

  <div class="section">
    <h2>Семья</h2>
    <label>Семейное положение</label>
    <select id="marital"></select>
    <label>Сколько детей</label>
    <input type="number" id="children" min="0" max="20" value="0" inputmode="numeric">
    <div id="youngestWrap" class="hidden">
      <label>Возраст младшего ребёнка</label>
      <select id="youngestChildAge"></select>
    </div>
    <div id="childChecks" class="checks"></div>
    <div id="familyChecks" class="checks"></div>
  </div>

  <div class="section">
    <h2>Доход</h2>
    <label>Доход семьи в месяц, ₽</label>
    <input type="number" id="income" min="0" inputmode="numeric" placeholder="например, 35000">
    <label>Человек в семье, включая вас</label>
    <input type="number" id="familySize" min="1" max="30" value="1" inputmode="numeric">
  </div>

  <div class="section">
    <h2>Жильё и вычеты</h2>
    <div id="housingChecks" class="checks"></div>
    <div id="taxChecks" class="checks"></div>
  </div>

  <div class="section">
    <h2>Статусы и льготы</h2>
    <div id="specialChecks" class="checks"></div>
  </div>

  <div id="list"></div>

  <div id="result"><div class="cnt">—</div></div>
</body>
</html>
